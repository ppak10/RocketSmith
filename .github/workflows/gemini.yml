name: gemini-extension

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up UV
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"

      - name: Install project dependencies
        run: uv sync --locked --all-extras --dev

      - name: Install rocketsmith package locally
        run: uv pip install -e .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: |
          npm install -g @google/gemini-cli
          gemini --version

      - name: Initialize Gemini Config
        run: |
          mkdir -p "$HOME/.gemini/extensions"
          echo '{}' > "$HOME/.gemini/projects.json"
          chmod -R 777 "$HOME/.gemini"

      - name: Install Extension
        env:
          GEMINI_API_KEY: "dummy-key-for-init"
        run: |
          gemini extensions install . --consent

          
      - name: Verify Installation
        run: |
          echo "=== Extensions List ==="
          gemini extensions list
          gemini extensions list | grep "rocketsmith"
          
          echo "=== Skills List ==="
          gemini skills list
          gemini skills list | grep "rocketsmith"
          
          echo "=== Agents List ==="
          # Check if gemini agents list works
          gemini agents list 2>/dev/null | grep "rocketsmith" || echo "rocketsmith not found in agents list (or command not available)"
