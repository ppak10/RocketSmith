name: openrocket-windows

on: [push, pull_request]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up UV
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"

      - name: Install project dependencies
        run: uv sync --locked --dev

      - name: Install rocketsmith package locally
        run: uv pip install -e .

      - name: Install OpenRocket
        run: uv run rocketsmith openrocket install
        env:
          PYTHONUTF8: 1

      - name: Run OpenRocket tests
        run: uv run pytest tests/openrocket --cov=rocketsmith.openrocket --cov-report xml --junitxml=junitxml -o junit_family=legacy
        env:
          NO_COLOR: 1
          PYTHONUTF8: 1
          TERM: dumb

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
