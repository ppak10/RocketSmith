[project]
name = "rocketsmith"
version = "0.0.7"
authors = [
  { name = "Peter Pak", email = "ppak10@gmail.com" },
  { name = "Jesse Barkley" },
  { name = "Rumi Loghmani" },
]
description = "Let agents design, simulate, and build your rocket."
license = { file = "LICENSE" }
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.12.3",
    "orhelper>=0.1.3",
    "pydantic>=2.11.7",
    "questionary>=2.1.1",
    "rich>=14.0.0",
    "typer>=0.16.0",
    "workspace-agent>=0.1.9",
]

[project.urls]
Homepage = "https://github.com/ppak10/RocketSmith"
Issues = "https://github.com/ppak10/RocketSmith/issues"

[project.scripts]
rocketsmith = "rocketsmith.cli:app"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"rocketsmith.data" = ["**/*.md", "**/*.ork", "**/*.step"]

[tool.black]
line-length = 88
target-version = ["py310"]

[dependency-groups]
dev = [
    "anyio>=4.13.0",
    "black>=25.1.0",
    "coverage>=7.10.5",
    "pre-commit>=4.3.0",
    "pytest>=8.4.1",
    "pytest-cov>=6.2.1",
]

[tool.pytest.ini_options]
filterwarnings = []
